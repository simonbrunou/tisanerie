name: CI

on:
  push:
  pull_request:

# Follow-up: add Lighthouse CI (treosh/lighthouse-ci-action) and axe-core
# via Playwright once the test suite has browser coverage.

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
